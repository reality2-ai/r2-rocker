<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>R2 Rocker Rig — WASM viewer</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #0a0e17;
    color: #e0e0e0;
    min-height: 100vh;
  }
  .header {
    background: linear-gradient(135deg, #1a1f35 0%, #0d1220 100%);
    border-bottom: 1px solid #2a3050;
    padding: 16px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .header h1 { font-size: 20px; font-weight: 600; color: #fff; }
  .header h1 span { color: #4a9eff; }
  .header-controls {
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .connection-status {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
  }
  .status-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    background: #ff4444;
    transition: background 0.3s;
  }
  .status-dot.connected { background: #44ff88; }

  .btn-connect {
    padding: 8px 16px;
    border: 1px solid #3b82f6;
    border-radius: 8px;
    background: #1e3a5f;
    color: #93c5fd;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .btn-connect:hover:not(:disabled) { background: #2563eb; color: white; }
  .btn-connect:disabled { opacity: 0.5; cursor: not-allowed; }

  /* ── Bootstrap log panel ── */
  .bootstrap-panel {
    display: none;
    max-width: 1600px;
    margin: 0 auto;
    padding: 0 16px;
  }
  .bootstrap-panel.visible { display: block; }
  .bootstrap-log-card {
    background: #0c1017;
    border: 1px solid #1e293b;
    border-radius: 12px;
    padding: 16px 20px;
    position: relative;
    margin-top: 12px;
  }
  .bootstrap-log-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
  }
  .bootstrap-log-header h2 {
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: #64748b;
    margin: 0;
  }
  .bootstrap-close {
    background: none;
    border: none;
    color: #64748b;
    font-size: 18px;
    cursor: pointer;
    padding: 2px 6px;
    border-radius: 4px;
  }
  .bootstrap-close:hover { color: #e0e0e0; background: #1e293b; }
  .bootstrap-log-entries {
    max-height: 200px;
    overflow-y: auto;
    font-family: 'SF Mono', Consolas, monospace;
    font-size: 12px;
    line-height: 1.7;
    background: #080b10;
    border-radius: 6px;
    padding: 10px 14px;
  }
  .bootstrap-log-entries::-webkit-scrollbar { width: 6px; }
  .bootstrap-log-entries::-webkit-scrollbar-track { background: transparent; }
  .bootstrap-log-entries::-webkit-scrollbar-thumb { background: #2a3050; border-radius: 3px; }
  .bs-line { color: #94a3b8; }
  .bs-line.amber { color: #fbbf24; }
  .bs-line.green { color: #34d399; }
  .bs-line.red { color: #f87171; }

  /* ── Main layout ── */
  /* `display: grid/block` here would beat the implicit display:none from
     the [hidden] attribute used by setView() to switch tabs — restore it. */
  [hidden] { display: none !important; }
  .main {
    display: grid;
    grid-template-columns: 1fr 280px;
    gap: 16px;
    padding: 16px;
    max-width: 1600px;
    margin: 0 auto;
  }

  /* Sensor charts area — always 2-col; lone sensor spans both */
  .sensors-area {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
  }
  .sensor-card:only-child {
    grid-column: 1 / -1;
  }

  /* Right sidebar */
  .sidebar {
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .card {
    background: #111827;
    border: 1px solid #1e293b;
    border-radius: 12px;
    padding: 20px;
  }
  .card h2 {
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: #64748b;
    margin-bottom: 14px;
  }

  /* Sensor chart card */
  .sensor-card { position: relative; min-width: 0; }
  .sensor-label {
    font-size: 16px;
    font-weight: 700;
    color: #fff;
    margin-bottom: 4px;
  }
  .sensor-label .sensor-addr {
    font-size: 11px;
    font-weight: 400;
    color: #4a9eff;
    font-family: 'SF Mono', monospace;
    margin-left: 8px;
  }
  .sensor-stats {
    display: flex;
    gap: 16px;
    margin-top: 8px;
    font-family: 'SF Mono', monospace;
    font-size: 12px;
  }
  .sensor-stats span { opacity: 0.7; }
  .sensor-stats .vx { color: #ff6384; }
  .sensor-stats .vy { color: #36a2eb; }
  .sensor-stats .vz { color: #4bc0c0; }
  .sensor-stats .vmag { color: #f59e0b; }
  .chart-container { position: relative; height: 260px; }

  /* Per-sensor event log */
  .sensor-event-log {
    max-height: 80px;
    overflow-y: auto;
    font-family: 'SF Mono', Consolas, monospace;
    font-size: 0.75rem;
    line-height: 1.5;
    background: #111827;
    border-radius: 6px;
    padding: 6px 10px;
    margin-top: 8px;
  }
  .sensor-event-log::-webkit-scrollbar { width: 5px; }
  .sensor-event-log::-webkit-scrollbar-track { background: transparent; }
  .sensor-event-log::-webkit-scrollbar-thumb { background: #2a3050; border-radius: 3px; }
  .sensor-event-line { color: #64748b; }
  .sensor-event-line .sel-time { color: #4a9eff; }
  .sensor-event-line .sel-text { color: #94a3b8; }
  .sensors-area.dual .chart-container { height: 260px; }

  /* Controls */
  .state-indicator {
    text-align: center;
    padding: 14px;
    border-radius: 8px;
    margin-bottom: 14px;
    font-size: 16px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 2px;
  }
  .state-idle { background: #1e293b; color: #64748b; }
  .state-calibrating { background: #2d1f00; color: #fbbf24; }
  .state-rocking { background: #002d1a; color: #34d399; }

  .btn-group { display: flex; flex-direction: column; gap: 8px; }
  .btn {
    padding: 12px 16px;
    border: none;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .btn:hover { transform: translateY(-1px); }
  .btn:active { transform: translateY(0); }
  .btn:disabled { opacity: 0.3; cursor: not-allowed; transform: none; }
  .btn-start { background: #059669; color: white; }
  .btn-start:hover:not(:disabled) { background: #047857; }
  .btn-mark { background: #d97706; color: white; }
  .btn-mark:hover:not(:disabled) { background: #b45309; }
  .btn-stop { background: #dc2626; color: white; }
  .btn-stop:hover:not(:disabled) { background: #b91c1c; }

  .cal-status {
    margin-top: 10px;
    font-size: 11px;
    color: #64748b;
    font-family: 'SF Mono', monospace;
    min-height: 16px;
  }

  /* Event log */
  .log-card { grid-column: 1 / -1; }
  .log-entries {
    max-height: 120px;
    overflow-y: auto;
    font-family: 'SF Mono', Consolas, monospace;
    font-size: 11px;
    line-height: 1.6;
  }
  .log-entry { color: #64748b; }
  .log-entry .time { color: #4a9eff; }
  .log-entry .src  { color: #a78bfa; }
  .log-entry .event { color: #34d399; }
  .log-entry .value { color: #fbbf24; }

  /* Log row below main grid */
  .log-row {
    padding: 0 16px 16px;
    max-width: 1600px;
    margin: 0 auto;
  }

  @media (max-width: 900px) {
    .main { grid-template-columns: 1fr; }
    .sensors-area.dual { grid-template-columns: 1fr; }
    .chart-container { height: 220px; }
  }

  /* ── Phase 8a: Devices view ─────────────────────────────────────────── */
  .view-toggle {
    display: inline-flex;
    background: #1e293b;
    border: 1px solid #334155;
    border-radius: 8px;
    overflow: hidden;
    margin-right: 12px;
  }
  .view-toggle button {
    background: transparent;
    border: 0;
    color: #94a3b8;
    padding: 7px 14px;
    font-size: 13px;
    cursor: pointer;
  }
  .view-toggle button.active {
    background: #4a9eff;
    color: #fff;
    font-weight: 600;
  }

  .devices-main {
    max-width: 1600px;
    margin: 0 auto;
    padding: 12px 24px 0;
  }
  .devices-area {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
    gap: 12px;
  }

  .device-card {
    background: #1e293b;
    border: 1px solid #334155;
    border-radius: 10px;
    padding: 14px 16px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .device-card .device-header {
    display: flex;
    align-items: center;
    gap: 10px;
    font-weight: 600;
    color: #f1f5f9;
  }
  .device-card .online-dot {
    width: 10px; height: 10px; border-radius: 50%;
    background: #22c55e;
    box-shadow: 0 0 6px #22c55e;
    flex-shrink: 0;
  }
  .device-card.stale .online-dot { background: #facc15; box-shadow: 0 0 6px #facc15; }
  .device-card.offline .online-dot { background: #475569; box-shadow: none; }

  .device-card .device-row {
    display: flex;
    justify-content: space-between;
    font-size: 13px;
    color: #94a3b8;
    font-family: 'SF Mono', Menlo, monospace;
  }
  .device-card .device-row .label { color: #64748b; }
  .device-card .device-row .value { color: #e2e8f0; }

  .battery-bar {
    height: 6px; background: #0f172a; border-radius: 3px; overflow: hidden;
    margin-top: 4px;
  }
  .battery-bar > div {
    height: 100%;
    background: linear-gradient(90deg, #22c55e, #84cc16);
    transition: width 0.4s ease;
  }
  .battery-bar > div.low { background: linear-gradient(90deg, #f97316, #facc15); }
  .battery-bar > div.crit { background: #ef4444; }

  /* Virtual LED — solid until Phase 5L sends FSM state, then animated */
  .virt-led {
    width: 14px; height: 14px; border-radius: 50%;
    border: 1px solid #475569;
    background: #334155;
    flex-shrink: 0;
  }
  .virt-led.tg-boot       { background: #f8fafc; box-shadow: 0 0 8px #f8fafc; animation: led-flash 1s 1; }
  .virt-led.tg-advertising { background: #3b82f6; box-shadow: 0 0 8px #3b82f6; animation: led-pulse 1.0s ease-in-out infinite; }
  .virt-led.tg-ble        { background: #06b6d4; box-shadow: 0 0 8px #06b6d4; animation: led-pulse 0.4s ease-in-out infinite; }
  /* Steady (no animation) for resting states — animation is reserved for
     "needs attention" or "in transition". The physical RGB LED still
     heartbeats so the rig itself remains glanceable; the dashboard's
     virtual LED conveys the same colour without the visual chatter. */
  .virt-led.tg-streaming  { background: #22c55e; box-shadow: 0 0 8px #22c55e; }
  .virt-led.tg-catchup    { background: #facc15; box-shadow: 0 0 8px #facc15; }
  .virt-led.tg-cal        { background: #a855f7; box-shadow: 0 0 8px #a855f7; }
  .virt-led.tg-low        { background: #f97316; box-shadow: 0 0 8px #f97316; animation: led-pulse 1.5s ease-in-out infinite; }
  .virt-led.tg-ota        { background: #ec4899; box-shadow: 0 0 8px #ec4899; animation: led-strobe 0.18s steps(2) infinite; }
  .virt-led.tg-error      { background: #ef4444; box-shadow: 0 0 8px #ef4444; animation: led-pulse 0.25s ease-in-out infinite; }
  /* Streaming with synthetic data — purple slow pulse, distinct from solid-purple Calibrating */
  .virt-led.tg-streaming-sim { background: #a855f7; box-shadow: 0 0 8px #a855f7; animation: led-pulse 2.0s ease-in-out infinite; }
  /* Transient client-side state: optimistic indicator while a remote reset is in flight. Cleared when the sensor reconnects. */
  .virt-led.tg-resetting  { background: #94a3b8; box-shadow: 0 0 6px #94a3b8; animation: led-pulse 0.5s ease-in-out infinite; }

  /* Health-source dot — second indicator next to the FSM-state dot. */
  .health-dot {
    width: 10px; height: 10px; border-radius: 50%;
    flex-shrink: 0;
    border: 1px solid #475569;
  }
  .health-dot.health-real { background: #22c55e; box-shadow: 0 0 4px #22c55e; }
  .health-dot.health-sim  { background: #a855f7; box-shadow: 0 0 6px #a855f7; animation: led-pulse 2.0s ease-in-out infinite; }
  .health-label {
    font-size: 0.78em;
    color: #94a3b8;
    margin-left: 4px;
  }
  .health-label.health-sim-text { color: #c4b5fd; }
  .health-row {
    display: flex;
    align-items: center;
    gap: 4px;
    margin-top: 4px;
  }

  @keyframes led-pulse     { 0%,100% { opacity: 1; } 50% { opacity: 0.25; } }
  @keyframes led-heartbeat { 0%, 30%, 100% { opacity: 1; } 15%, 45% { opacity: 0.3; } }
  @keyframes led-strobe    { 0% { opacity: 1; } 50% { opacity: 0; } }
  @keyframes led-flash     { 0% { opacity: 0; } 30%, 70% { opacity: 1; } 100% { opacity: 0; } }

  .device-actions {
    display: flex;
    gap: 8px;
    margin-top: auto;
  }
  .btn-update {
    flex: 1;
    background: #475569;
    color: #f1f5f9;
    border: 0;
    border-radius: 6px;
    padding: 7px 10px;
    font-size: 12px;
    cursor: pointer;
  }
  .btn-update:hover { background: #64748b; }
  .btn-update:disabled { opacity: 0.5; cursor: not-allowed; }

  /* Secondary destructive action — reset sensor (amber outline). */
  .btn-reset {
    flex: 1;
    background: transparent;
    color: #f59e0b;
    border: 1px solid #b45309;
    border-radius: 6px;
    padding: 7px 10px;
    font-size: 12px;
    cursor: pointer;
  }
  .btn-reset:hover { background: rgba(245, 158, 11, 0.12); }
  .btn-reset:disabled { opacity: 0.5; cursor: not-allowed; }

  .devices-summary {
    display: flex;
    gap: 18px;
    color: #94a3b8;
    font-size: 13px;
    margin-bottom: 10px;
    padding: 10px 14px;
    background: #1e293b;
    border: 1px solid #334155;
    border-radius: 8px;
  }
  .devices-summary strong { color: #e2e8f0; }
</style>
</head>
<body>

<div class="header">
  <h1><span>R2</span> Rocker Rig — Dashboard</h1>
  <div class="header-controls">
    <div class="view-toggle" id="viewToggle">
      <button id="viewLive"    class="active" onclick="setView('live')">Live</button>
      <button id="viewDevices"               onclick="setView('devices')">Devices</button>
    </div>
    <button class="btn-connect" id="btn-connect" onclick="startBootstrap()">&#x1F50D; Connect Sensors</button>
    <div class="connection-status">
      <div class="status-dot" id="wsDot"></div>
      <span id="wsStatus">Connecting...</span>
      <span style="margin-left:14px; color:#64748b;">Sensors:</span>
      <span id="sensorCount" style="font-weight:600; color:#4a9eff;">0</span>
    </div>
  </div>
</div>

<!-- ── Devices view (Phase 8a) ─────────────────────────────────────── -->
<div class="devices-main" id="devicesMain" hidden>
  <div class="devices-summary" id="devicesSummary">
    <span><strong id="dsTotal">0</strong> known</span>
    <span><strong id="dsOnline" style="color:#22c55e;">0</strong> online</span>
    <span><strong id="dsStale" style="color:#facc15;">0</strong> stale</span>
    <span><strong id="dsOffline" style="color:#64748b;">0</strong> offline</span>
    <span><strong id="dsNeedsUpdate" style="color:#ec4899;">0</strong> needs update</span>
  </div>
  <div class="devices-area" id="devicesArea">
    <div class="card" id="devicesPlaceholder" style="color:#475569; text-align:center; padding:40px;">
      No sensors known yet — wait for an announce or click <em>Connect Sensors</em>.
    </div>
  </div>
</div>

<div class="main" id="liveMain">
  <!-- Sensor charts (populated dynamically) -->
  <div class="sensors-area" id="sensorsArea">
    <div class="card" id="sensorPlaceholder" style="color:#475569; text-align:center; padding:60px;">
      Waiting for sensors…
    </div>
  </div>

  <!-- Sidebar: controls -->
  <div class="sidebar">
    <div class="card">
      <h2>Run Control</h2>
      <div class="state-indicator state-idle" id="stateIndicator">IDLE</div>
      <div class="btn-group">
        <button class="btn btn-start" id="btnStart" onclick="sendCmd('start')">&#x25B6; Start</button>
        <button class="btn btn-mark" id="btnMark" onclick="sendCmd('mark')" disabled>&#x2691; Mark</button>
        <button class="btn btn-stop" id="btnStop" onclick="sendCmd('stop')" disabled>&#x25A0; Stop</button>
      </div>
      <div class="cal-status" id="calStatus">&mdash;</div>
    </div>

    <div class="card">
      <h2>Connected Sensors</h2>
      <div id="sensorList" style="font-family:'SF Mono',monospace; font-size:12px; color:#64748b;">
        None
      </div>
    </div>
  </div>
</div>

<!-- Bootstrap log panel (between graphs and event log) -->
<div class="bootstrap-panel" id="bootstrap-panel">
  <div class="bootstrap-log-card">
    <div class="bootstrap-log-header">
      <h2>Connection Log</h2>
      <button class="bootstrap-close" onclick="closeBootstrapPanel()">&times;</button>
    </div>
    <div class="bootstrap-log-entries" id="bootstrap-log"></div>
  </div>
</div>

<!-- Event log -->
<div class="log-row">
  <div class="card log-card">
    <h2>Event Log</h2>
    <div class="log-entries" id="logEntries"></div>
  </div>
</div>

<script type="module">
const MAX_POINTS = 200;
const CALIBRATION_MIN = 10;

// ── Global state ──
let runState = 'idle';
let totalEvents = 0;

// ── Per-sensor state ── keyed by source_addr (IP:port)
const sensors = new Map();

function getSensorKey(addr) {
  return addr ? addr.split(':')[0] : addr;
}

function getOrCreateSensor(addr) {
  const key = getSensorKey(addr);
  if (sensors.has(key)) return sensors.get(key);

  const area = document.getElementById('sensorsArea');
  const placeholder = document.getElementById('sensorPlaceholder');
  if (placeholder) placeholder.remove();

  const safeKey = key.replace(/\./g, '-');
  const card = document.createElement('div');
  card.className = 'card sensor-card';
  card.id = 'sensor-' + safeKey;

  card.innerHTML = `
    <div class="sensor-label" id="slabel-${safeKey}">${key}<span class="sensor-addr">${key}</span></div>
    <div class="chart-container">
      <canvas id="chart-${safeKey}"></canvas>
    </div>
    <div class="sensor-stats">
      <span>x: <span class="vx" id="vx-${safeKey}">&mdash;</span></span>
      <span>y: <span class="vy" id="vy-${safeKey}">&mdash;</span></span>
      <span>z: <span class="vz" id="vz-${safeKey}">&mdash;</span></span>
      <span>|A|: <span class="vmag" id="vmag-${safeKey}">&mdash;</span></span>
      <span style="margin-left:auto; color:#475569;" id="rate-${safeKey}">&mdash; Hz</span>
    </div>
    <div class="sensor-event-log" id="slog-${safeKey}"></div>
  `;
  area.appendChild(card);
  setTimeout(() => sensors.forEach(s => s.chart.resize()), 50);

  const ctx = document.getElementById('chart-' + safeKey).getContext('2d');
  const chart = new Chart(ctx, {
    type: 'line',
    data: {
      labels: [],
      datasets: [
        { label: 'x (g)', data: [], borderColor: '#ff6384', borderWidth: 1.5, pointRadius: 0, tension: 0.2 },
        { label: 'y (g)', data: [], borderColor: '#36a2eb', borderWidth: 1.5, pointRadius: 0, tension: 0.2 },
        { label: 'z (g)', data: [], borderColor: '#4bc0c0', borderWidth: 1.5, pointRadius: 0, tension: 0.2 },
      ],
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      animation: false,
      scales: {
        x: { display: true, grid: { color: '#1e293b' }, ticks: { color: '#475569', maxTicksLimit: 8 } },
        y: { display: true, grid: { color: '#1e293b' }, ticks: { color: '#475569' }, title: { display: true, text: 'Acceleration (g)', color: '#64748b' }, suggestedMin: -2, suggestedMax: 2 },
      },
      plugins: { legend: { labels: { color: '#94a3b8', usePointStyle: true } } },
    },
  });

  const sensor = {
    key,
    deviceName: null,
    // Phase 8a (Devices view) state — populated by handlers in handleEvent.
    fwVer: null,
    devicePk: null,
    bootTsMs: null,
    battery: null,    // { voltage_mv, percent, charging, ts }
    fsmState: null,   // populated once Phase 5L firmware emits status events
    dataSource: null, // 0 = real ADXL355, 1 = sim fallback; null = unknown (no status yet)
    pendingReset: false, // transient: true between Reset button click and sensor reconnect
    lastSeen: Date.now(),
    online: true,
    chart,
    calibrationSamples: [],
    calibrationOffset: { x: 0, y: 0, z: 0 },
    sampleTimes: [],
    logCount: 0,
  };
  sensors.set(key, sensor);
  addSensorLog(sensor, 'connected');
  updateSensorList();
  return sensor;
}

function setDeviceName(sensor, name) {
  if (!name) return;

  // Deduplicate: if another sensor card already has this name (same physical device,
  // different IP — e.g. after DHCP renewal or reconnect), destroy the stale card.
  for (const [key, existing] of sensors) {
    if (existing !== sensor && existing.deviceName === name) {
      // Destroy the stale duplicate card
      const staleKey = key.replace(/\./g, '-');
      const staleCard = document.getElementById('sensor-' + staleKey);
      if (staleCard) {
        if (existing.chart) { existing.chart.destroy(); }
        staleCard.remove();
      }
      sensors.delete(key);
      break;
    }
  }

  if (sensor.deviceName === name) return;
  sensor.deviceName = name;
  const sk = sensor.key.replace(/\./g, '-');
  const labelEl = document.getElementById('slabel-' + sk);
  if (labelEl) labelEl.innerHTML = name + '<span class="sensor-addr">' + sensor.key + '</span>';
  updateSensorList();
}

function updateSensorList() {
  const el = document.getElementById('sensorList');
  document.getElementById('sensorCount').textContent = sensors.size;
  if (sensors.size === 0) { el.textContent = 'None'; return; }
  // Sidebar status dot reuses the same tg-* colour/animation map as the
  // Devices-view virtual LED, so the dot here mirrors the physical RGB
  // LED on the sensor as a quick visual reference. Until Phase 5L lands
  // a real fsmState (`r2.sensor.status`), ledClassFor() returns "" and
  // the dot stays the inert grey placeholder.
  el.innerHTML = [...sensors.values()].map(s => {
    const label = s.deviceName ? `${s.deviceName} <span style="color:#475569;">(${s.key})</span>` : s.key;
    const led = ledClassFor(s);
    return `<div style="display:flex; align-items:center; gap:8px; padding:4px 0; border-bottom:1px solid #1e293b; color:#94a3b8;">`
         + `<span class="virt-led ${led}" style="width:10px; height:10px;"></span>`
         + `<span>${label}</span></div>`;
  }).join('');
}

function addSensorLog(sensor, text) {
  const sk = sensor.key.replace(/\./g, '-');
  const el = document.getElementById('slog-' + sk);
  if (!el) return;
  const now = new Date();
  const ts = now.toLocaleTimeString('en-NZ', { hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit' });
  const line = document.createElement('div');
  line.className = 'sensor-event-line';
  line.innerHTML = `<span class="sel-time">[${ts}]</span> <span class="sel-text">${text}</span>`;
  el.appendChild(line);
  sensor.logCount++;
  while (sensor.logCount > 20) {
    el.removeChild(el.firstChild);
    sensor.logCount--;
  }
  el.scrollTop = el.scrollHeight;
}

// ── Bootstrap ──
function startBootstrap() {
  const btn = document.getElementById('btn-connect');
  btn.disabled = true;
  btn.textContent = 'Scanning…';

  // Safety net — the controller's bootstrap loop runs continuously and
  // only emits `Done` when every known sensor is simultaneously Active.
  // If any sensor never reports presence the button would otherwise be
  // stuck on "Scanning…" forever. Reset after 60 s no matter what; the
  // log panel keeps showing live progress in the background.
  if (window.__connectButtonTimeout) clearTimeout(window.__connectButtonTimeout);
  window.__connectButtonTimeout = setTimeout(resetConnectButton, 60_000);

  const panel = document.getElementById('bootstrap-panel');
  panel.classList.add('visible');
  document.getElementById('bootstrap-log').innerHTML = '';

  fetch('/api/bootstrap', { method: 'POST' })
    .then(r => {
      if (r.status === 409) {
        addBootstrapLine('Already connecting…', 'amber');
        resetConnectButton();
      } else if (!r.ok) {
        r.text().then(t => addBootstrapLine('Error: ' + t, 'red'));
        resetConnectButton();
      }
    })
    .catch(e => {
      addBootstrapLine('Fetch error: ' + e.message, 'red');
      resetConnectButton();
    });
}

function closeBootstrapPanel() {
  document.getElementById('bootstrap-panel').classList.remove('visible');
}

function handleBootstrapEvent(msg) {
  const evt = msg.event;
  if (!evt) return;

  // Reset event clears the bootstrap log panel for a fresh run. Note:
  // we intentionally do NOT clear the `sensors` map — a "restart the
  // bootstrap loop" gesture is distinct from "all sensors are gone".
  // The dashboard's cached `last_announce` is only replayed on /ws/raw
  // open, not on every bootstrap restart, so wiping fwVer/dataSource/
  // virtual-LED here would leave the device cards permanently blank
  // until each sensor next reboots and re-announces.
  if (evt === null || 'Reset' in msg.event) {
    document.getElementById('bootstrap-log').innerHTML = '';
    document.getElementById('bootstrap-panel').classList.add('visible');
    addBootstrapLine('↺ Restarting…', 'amber');
    return;
  }

  switch (evt.kind) {
    case 'Log':
      addBootstrapLine(evt.data, '');
      // Recognise steady-state messages — when the bootstrap loop has
      // either found sensors already streaming OR set up the hotspot and
      // is now waiting in scan-quiet mode, there's nothing further the
      // user is blocked on. Re-enable the button so they can re-trigger.
      // The bootstrap loop keeps running in the background regardless.
      if (/scan quiet for|sensor\(s\) streaming|Hotspot ready/i.test(evt.data)) {
        resetConnectButton();
      }
      break;
    case 'SensorFound':
      addBootstrapLine('Found sensor: ' + evt.data.addr, 'amber');
      break;
    case 'SensorConnected':
      addBootstrapLine('\u2713 ' + evt.data.name + ' connected (' + evt.data.ip + ')', 'green');
      // Per-sensor success \u2014 reset the button now rather than waiting
      // for `Done`, which only fires when *all* known sensors are
      // simultaneously Active (a state the loop may never reach if any
      // sensor drops out, and never re-fires after the first time).
      resetConnectButton();
      break;
    case 'Done':
      addBootstrapLine(evt.data.count + ' sensor(s) connected', 'green');
      resetConnectButton();
      break;
    case 'Error':
      addBootstrapLine('ERROR: ' + evt.data, 'red');
      resetConnectButton();
      break;
  }
}

function resetConnectButton() {
  const btn = document.getElementById('btn-connect');
  if (!btn) return;
  btn.disabled = false;
  btn.textContent = '\uD83D\uDD0D Connect Sensors';
  if (window.__connectButtonTimeout) {
    clearTimeout(window.__connectButtonTimeout);
    window.__connectButtonTimeout = null;
  }
}

function addBootstrapLine(text, cls) {
  const el = document.getElementById('bootstrap-log');
  const line = document.createElement('div');
  line.className = 'bs-line' + (cls ? ' ' + cls : '');
  line.textContent = text;
  el.appendChild(line);
  el.scrollTop = el.scrollHeight;
}

// ── WASM hive bootstrap + WebSocket /ws/raw ────────────────────────────────
//
// This viewer is the browser-side R2 hive. It receives raw R2-WIRE frames
// (with src_addr envelope) over WSS, decodes them in WebAssembly via the
// vendored r2-wasm bundle, and drives the existing Live + Devices UI by
// synthesising the same {event, source_addr, payload, ...} message shape
// the legacy JSON-pushing dashboard used. Existing handlers below stay
// unchanged.
import init, {
  fnv1a_32 as wasmFnv1a32,
  decode_compact_frame as wasmDecodeFrame,
  r2_version as wasmVersion,
} from './pkg/r2_wasm.js';

let ws;
let HASH_TO_NAME = new Map();           // u32 event_hash → friendly name
const LSB_PER_G_AT_2G = 256000;         // ADXL355 scale at ±2 g
const TEXT_DECODER = new TextDecoder('utf-8');

const KNOWN_EVENT_NAMES = [
  'r2.sensor.announce',
  'r2.sensor.acceleration',
  'r2.sensor.acceleration.batch',
  'r2.sensor.battery',
  'r2.sensor.status',
  'r2.sensor.event.log',
  'r2.sensor.cal.sample.resp',
  'r2.sensor.sync_pong',
  // Legacy M10 names retained for mixed-deployment compat.
  'acceleration',
  'battery_status',
  'run_state',
];

async function bootstrapHive() {
  try {
    await init();
  } catch (err) {
    console.error('[hive] WASM init FAILED:', err);
    document.getElementById('wsStatus').textContent = 'WASM init failed (see console)';
    return;
  }
  console.log('[hive] r2-wasm loaded:', wasmVersion());
  console.log('[hive] hash table:');
  for (const name of KNOWN_EVENT_NAMES) {
    const hash = wasmFnv1a32(new TextEncoder().encode(name)) >>> 0;
    HASH_TO_NAME.set(hash, name);
    console.log('  0x' + hash.toString(16).padStart(8, '0'), name);
  }
  console.log('[hive] connecting to /ws/raw …');
  connectRaw();
  console.log('[hive] connecting to /ws/status …');
  connectStatus();
}

let statusWs;
function connectStatus() {
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  statusWs = new WebSocket(`${proto}//${location.host}/ws/status`);
  statusWs.onopen = () => console.log('[hive] /ws/status open');
  statusWs.onclose = () => {
    console.log('[hive] /ws/status closed; retry in 2 s');
    setTimeout(connectStatus, 2000);
  };
  statusWs.onerror = (e) => console.warn('[hive] /ws/status error', e);
  statusWs.onmessage = (e) => {
    if (typeof e.data !== 'string') return;
    let msg;
    try { msg = JSON.parse(e.data); }
    catch (err) { console.warn('[hive] bad status JSON:', e.data); return; }
    if (msg.type === 'bootstrap') {
      handleBootstrapEvent(msg);
    } else if (msg.type === 'peer_disconnected') {
      // Server detected the sensor's TCP socket close. Flip the virtual
      // LED to inert grey now rather than waiting for the OFFLINE_MS
      // timeout to fire on lastSeen ageing.
      const s = sensors.get(msg.addr);
      if (s) {
        s.online = false;
        s.lastSeen = 0;            // forces classifyOnline → 'offline'
        updateSensorList();
        renderDevicesIfVisible();
      }
    } else if (msg.type === 'ota') {
      handleOtaEvent(msg);
    }
    // Future: hotspot, server_error, etc. (SPEC-R2-ROCKER-DASHBOARD §5.3)
  };
}

function connectRaw() {
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  ws = new WebSocket(`${proto}//${location.host}/ws/raw`);
  ws.binaryType = 'arraybuffer';
  ws.onopen = () => {
    document.getElementById('wsDot').className = 'status-dot connected';
    document.getElementById('wsStatus').textContent = 'Connected';
  };
  ws.onclose = () => {
    document.getElementById('wsDot').className = 'status-dot';
    document.getElementById('wsStatus').textContent = 'Disconnected';
    setTimeout(connectRaw, 2000);
  };
  ws.onerror = (e) => console.warn('[hive] ws error', e);
  ws.onmessage = (e) => {
    if (typeof e.data === 'string') return; // shouldn't happen on /ws/raw
    onRawFrame(new Uint8Array(e.data));
  };
}

// Envelope from dashboard's /ws/raw (Phase 5d step 3):
//   [u16 BE: src_addr_len][src_addr utf-8]
//   [u32 BE: ts_ms_low32]
//   [u16 BE: frame_len][frame bytes]
function onRawFrame(buf) {
  const dv = new DataView(buf.buffer, buf.byteOffset, buf.byteLength);
  let off = 0;
  const srcLen = dv.getUint16(off); off += 2;
  const src = TEXT_DECODER.decode(buf.subarray(off, off + srcLen));
  off += srcLen;
  const tsMs = dv.getUint32(off); off += 4;
  const frameLen = dv.getUint16(off); off += 2;
  const frame = buf.subarray(off, off + frameLen);

  let decoded;
  try {
    decoded = wasmDecodeFrame(frame);
  } catch (err) {
    console.warn('[hive] decode_compact_frame failed:', err);
    return;
  }

  const eventHash = decoded.event_hash >>> 0;
  const eventName = HASH_TO_NAME.get(eventHash) || 'unknown';
  // serde-wasm-bindgen serialises Vec<u8> as a JS Array (not Uint8Array)
  // — coerce so our CBOR decoder's DataView/subarray calls work.
  let payloadBytes = decoded.payload;
  if (payloadBytes && !(payloadBytes instanceof Uint8Array)) {
    payloadBytes = new Uint8Array(payloadBytes);
  }
  const payload = payloadBytes && payloadBytes.length
    ? remapPayload(eventName, decodeCbor(payloadBytes))
    : null;
  if (window.__r2_debug_frames) {
    console.log('[hive frame]', src, eventName,
                '0x' + eventHash.toString(16),
                'payload:', payload);
  }

  const msg = {
    event: eventName,
    hash: '0x' + eventHash.toString(16).padStart(8, '0').toUpperCase(),
    source_addr: src,
    timestamp_ms: tsMs,
    payload,
    device_name: payload && payload.hostname,
  };
  handleEvent(msg);
}

// Minimal CBOR decoder — covers exactly the major types our SPEC uses.
// uint, negint, bytes, text, array, map, bool, null. RFC 8949 §3.
function decodeCbor(bytes) {
  const dv = new DataView(bytes.buffer, bytes.byteOffset, bytes.byteLength);
  let pos = 0;
  function readHead() {
    const ib = dv.getUint8(pos++);
    const major = ib >> 5;
    const ai = ib & 0x1f;
    let len;
    if (ai < 24) len = ai;
    else if (ai === 24) { len = dv.getUint8(pos); pos += 1; }
    else if (ai === 25) { len = dv.getUint16(pos); pos += 2; }
    else if (ai === 26) { len = dv.getUint32(pos); pos += 4; }
    else if (ai === 27) {
      const hi = dv.getUint32(pos); const lo = dv.getUint32(pos + 4);
      pos += 8;
      len = hi * 0x100000000 + lo;
    } else throw new Error('cbor head ai=' + ai + ' unsupported');
    return { major, len };
  }
  function readValue() {
    const { major, len } = readHead();
    switch (major) {
      case 0: return len;
      case 1: return -1 - len;
      case 2: { const b = bytes.subarray(pos, pos + len); pos += len; return b; }
      case 3: { const s = TEXT_DECODER.decode(bytes.subarray(pos, pos + len)); pos += len; return s; }
      case 4: { const arr = []; for (let i = 0; i < len; i++) arr.push(readValue()); return arr; }
      case 5: { const obj = {}; for (let i = 0; i < len; i++) { const k = readValue(); const v = readValue(); obj[String(k)] = v; } return obj; }
      case 7:
        if (len === 20) return false;
        if (len === 21) return true;
        if (len === 22) return null;
        throw new Error('cbor simple ' + len + ' unsupported');
      default:
        throw new Error('cbor major=' + major + ' unsupported');
    }
  }
  return readValue();
}

// Port of the dashboard's server-side remap_payload — turns int-keyed CBOR
// maps into named-key JS objects, and scales raw ADXL355 LSB to g for
// acceleration. Browser-side equivalent of dashboard/src/main.rs.
function remapPayload(eventName, raw) {
  if (!raw || typeof raw !== 'object') return raw;
  function bytesToHex(v) {
    if (v instanceof Uint8Array) {
      return Array.from(v).map(b => b.toString(16).padStart(2, '0')).join('');
    }
    return v;
  }
  if (eventName === 'r2.sensor.acceleration') {
    return {
      seq:   raw['0'],
      ts_ms: raw['1'],
      x: typeof raw['2'] === 'number' ? raw['2'] / LSB_PER_G_AT_2G : null,
      y: typeof raw['3'] === 'number' ? raw['3'] / LSB_PER_G_AT_2G : null,
      z: typeof raw['4'] === 'number' ? raw['4'] / LSB_PER_G_AT_2G : null,
      range: raw['10'],
    };
  }
  const SCHEMA = {
    'r2.sensor.battery':     [['0','voltage_mv'],['1','percent'],['2','charging'],['3','ts_ms'],['10','temp_c']],
    'r2.sensor.announce':    [['0','device_pk'],['1','hostname'],['2','fw_ver'],['3','last_seq'],['4','boot_ts_ms'],['5','nonce'],['6','sig'],['10','mounting_role']],
    'r2.sensor.status':      [['0','state'],['1','uptime_ms'],['2','samples_total'],['3','samples_acked'],['4','sd_pct_used'],['5','rate_hz_active'],['6','range_active'],['7','data_source'],['10','error_code']],
  };
  const map = SCHEMA[eventName];
  if (!map) return raw;
  const out = {};
  for (const [intKey, name] of map) {
    if (intKey in raw) out[name] = raw[intKey];
  }
  // bytes fields → hex (matches what the legacy server-side remap produced)
  for (const k of ['device_pk','nonce','sig']) {
    if (out[k] instanceof Uint8Array) out[k] = bytesToHex(out[k]);
  }
  return out;
}

bootstrapHive();

function handleEvent(msg) {
  totalEvents++;
  const sensor = msg.source_addr ? getOrCreateSensor(msg.source_addr) : null;

  switch (msg.event) {
    case 'r2.sensor.acceleration':
    case 'acceleration': // legacy M10 schema
      if (sensor) {
        if (msg.device_name) setDeviceName(sensor, msg.device_name);
        handleAcceleration(msg, sensor);
      }
      return;  // don't log raw acceleration frames — too noisy at 10Hz
    case 'run_state':
      if (sensor) {
        handleRunState(msg);
        // Log the state name (payload.state is a number from the sensor)
        if (msg.payload && msg.payload.state != null) {
          const stateLabel = decodeStateNum(msg.payload.state);
          addSensorLog(sensor, 'state → ' + stateLabel);
        }
      }
      break;
    case 'r2.sensor.announce':
      if (sensor && msg.payload) {
        // Schema field is `hostname` (key 1) per remapPayload SCHEMA;
        // the legacy server-side `name` was a synthetic alias.
        const hn = msg.payload.hostname;
        if (hn) {
          setDeviceName(sensor, hn);
          addSensorLog(sensor, 'announced: ' + hn);
        }
        // Capture announce metadata for the Devices view (Phase 8a).
        // Was previously only captured from the legacy `sensor.connected`
        // synthetic event which the new /ws/raw path doesn't emit.
        if (msg.payload.fw_ver)    sensor.fwVer    = msg.payload.fw_ver;
        if (msg.payload.device_pk) sensor.devicePk = msg.payload.device_pk;
        if (msg.payload.boot_ts_ms != null) sensor.bootTsMs = msg.payload.boot_ts_ms;
        sensor.online = true;
        sensor.lastSeen = Date.now();
        renderDevicesIfVisible();
        updateSensorList();
      }
      return;
    case 'sensor.connected':
      if (sensor) {
        if (msg.device_name) setDeviceName(sensor, msg.device_name);
        addSensorLog(sensor, 'connected');
        // Capture announce metadata for the Devices view (Phase 8a).
        if (msg.payload) {
          if (msg.payload.fw_ver)    sensor.fwVer    = msg.payload.fw_ver;
          if (msg.payload.device_pk) sensor.devicePk = msg.payload.device_pk;
          if (msg.payload.boot_ts_ms != null) sensor.bootTsMs = msg.payload.boot_ts_ms;
        }
        sensor.online = true;
        sensor.lastSeen = Date.now();
        renderDevicesIfVisible();
        // Do NOT call applyState here. The sensor.connected event fires for
        // three different cases that need different treatment:
        //   1. First connect: sensor is idle → handled by run_state broadcast
        //   2. Reconnect: sensor reset to idle → handled by run_state broadcast
        //   3. New browser joining existing session: WS replay — must NOT reset
        //      a live session already in rocking state for an existing browser.
        //
        // State sync is driven by the sensor's run_state broadcast (sent by
        // the sensor immediately after connect). This decouples the TCP
        // event (which fires for all three cases) from FSM transitions.
      }
      addLog(msg);
      return;
    case 'r2.sensor.battery':
    case 'battery_status':
      if (sensor && msg.payload) {
        sensor.battery = {
          voltage_mv: msg.payload.voltage_mv ?? null,
          percent:    msg.payload.percent    ?? null,
          charging:   msg.payload.charging   ?? false,
          ts:         Date.now(),
        };
        sensor.lastSeen = Date.now();
        sensor.online = true;
        renderDevicesIfVisible();
      }
      addLog(msg);
      return;
    case 'r2.sensor.status':
      if (sensor && msg.payload) {
        // Capture FSM state for the virtual LED + sidebar status dot
        // (both light up once Phase 5L sends real state values).
        if (msg.payload.state != null) sensor.fsmState = msg.payload.state;
        // SPEC-R2-ROCKER-SENSOR-HEALTH: data_source key 7 → 0 real, 1 sim.
        if (msg.payload.data_source != null) sensor.dataSource = msg.payload.data_source;
        // First status frame after a reset clicks the transient indicator off.
        if (sensor.pendingReset) sensor.pendingReset = false;
        sensor.lastSeen = Date.now();
        sensor.online = true;
        renderDevicesIfVisible();
        updateSensorList(); // keep sidebar dot's colour in sync with fsmState
      }
      addLog(msg);
      return;
  }
  // Any event we didn't return early from updates lastSeen too — useful
  // for the Devices view's online/stale/offline classification.
  if (sensor) {
    sensor.lastSeen = Date.now();
    sensor.online = true;
  }
  addLog(msg);
}

function handleAcceleration(msg, sensor) {
  if (!msg.payload) return;
  const rawX = msg.payload.x ?? 0;
  const rawY = msg.payload.y ?? 0;
  const rawZ = msg.payload.z ?? 0;

  if (runState === 'calibrating') {
    sensor.calibrationSamples.push({ x: rawX, y: rawY, z: rawZ });
    const n = sensors.size > 0
      ? Math.min(...[...sensors.values()].map(s => s.calibrationSamples.length))
      : 0;
    document.getElementById('calStatus').textContent =
      `Calibrating\u2026 ${n} sample${n !== 1 ? 's' : ''}`;
    document.getElementById('btnMark').disabled = (n < CALIBRATION_MIN);
  }

  const x = rawX - sensor.calibrationOffset.x;
  const y = rawY - sensor.calibrationOffset.y;
  const z = rawZ - sensor.calibrationOffset.z;
  const mag = Math.sqrt(x*x + y*y + z*z);

  const unit = runState === 'rocking' ? ' \u0394g' : ' g';
  const sk = sensor.key.replace(/\./g, '-');
  const setText = (id, v) => { const el = document.getElementById(id); if (el) el.textContent = v; };
  setText('vx-' + sk, x.toFixed(3) + unit);
  setText('vy-' + sk, y.toFixed(3) + unit);
  setText('vz-' + sk, z.toFixed(3) + unit);
  setText('vmag-' + sk, mag.toFixed(3));

  const now = Date.now();
  sensor.sampleTimes.push(now);
  if (sensor.sampleTimes.length > 50) sensor.sampleTimes.shift();
  if (sensor.sampleTimes.length > 1) {
    const dt = (sensor.sampleTimes[sensor.sampleTimes.length-1] - sensor.sampleTimes[0])
               / (sensor.sampleTimes.length - 1);
    setText('rate-' + sk, (1000/dt).toFixed(1) + ' Hz');
  }

  if (runState !== 'rocking') return;
  // Chart is hidden on the Devices tab — skip all chart work when not Live.
  if (currentView !== 'live') return;

  const label = new Date(msg.timestamp_ms).toLocaleTimeString('en-NZ', {
    hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit'
  });
  sensor.chart.data.labels.push(label);
  sensor.chart.data.datasets[0].data.push(x);
  sensor.chart.data.datasets[1].data.push(y);
  sensor.chart.data.datasets[2].data.push(z);
  if (sensor.chart.data.labels.length > MAX_POINTS) {
    sensor.chart.data.labels.shift();
    sensor.chart.data.datasets[0].data.shift();
    sensor.chart.data.datasets[1].data.shift();
    sensor.chart.data.datasets[2].data.shift();
  }
  sensor.chart.update('none'); // skip animation on streaming updates — 10Hz * 2 sensors = too slow otherwise
}

const ORDER = { idle: 0, calibrating: 1, rocking: 2 };
const STATE_NAMES = ['idle', 'calibrating', 'rocking'];

// Sensor sends state as a float (0.0=idle, 1.0=calibrating, 2.0=rocking).
// Map it back to a string name; fall back to 'idle' for unknown values.
function decodeStateNum(raw) {
  if (typeof raw === 'string' && ORDER[raw] !== undefined) return raw;
  const idx = typeof raw === 'number' ? Math.round(raw) : -1;
  return STATE_NAMES[idx] ?? 'idle';
}

function handleRunState(msg) {
  if (!msg.payload) return;
  // Decode numeric state (0/1/2) OR accept string if somehow already decoded
  const s = decodeStateNum(msg.payload.state ?? 0);
  // Rule: idle always resets; any other state only applies if it advances the FSM.
  if (s !== 'idle' && ORDER[s] <= ORDER[runState]) return;
  applyState(s);
}

function applyState(s) {
  runState = s;
  const el = document.getElementById('stateIndicator');
  el.textContent = s.toUpperCase();
  el.className = 'state-indicator state-' + s;
  document.getElementById('btnStart').disabled = (s !== 'idle');
  document.getElementById('btnStop').disabled = (s === 'idle');
  if (s !== 'calibrating') document.getElementById('btnMark').disabled = true;
}

function sendCmd(cmd) {
  if (!ws || ws.readyState !== WebSocket.OPEN) return;
  ws.send(JSON.stringify({ command: cmd }));

  switch (cmd) {
    case 'start':
      sensors.forEach(s => {
        s.calibrationSamples = [];
        s.calibrationOffset = { x: 0, y: 0, z: 0 };
        s.chart.data.labels.length = 0;
        s.chart.data.datasets.forEach(ds => { ds.data.length = 0; });
        s.chart.update();
      });
      document.getElementById('calStatus').textContent = 'Calibrating\u2026';
      applyState('calibrating');
      break;

    case 'mark':
      let calSummary = [];
      sensors.forEach(s => {
        const samps = s.calibrationSamples;
        if (samps.length >= CALIBRATION_MIN) {
          const n = samps.length;
          s.calibrationOffset.x = samps.reduce((a, v) => a + v.x, 0) / n;
          s.calibrationOffset.y = samps.reduce((a, v) => a + v.y, 0) / n;
          s.calibrationOffset.z = samps.reduce((a, v) => a + v.z, 0) / n;
          calSummary.push(`${s.key}: z=${s.calibrationOffset.z.toFixed(3)}`);
        }
        s.calibrationSamples = [];
      });
      document.getElementById('calStatus').textContent =
        calSummary.length ? 'Cal: ' + calSummary.join(' | ') : '\u2014';
      applyState('rocking');
      break;

    case 'stop':
      applyState('idle');
      break;
  }
}

function addLog(msg) {
  const el = document.getElementById('logEntries');
  const time = new Date(msg.timestamp_ms).toLocaleTimeString('en-NZ', {
    hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit',
    fractionalSecondDigits: 1
  });
  const src = msg.source_addr ? getSensorKey(msg.source_addr) : '?';
  let valueStr = '';
  if (msg.event === 'sensor.connected' && msg.device_name) {
    valueStr = msg.device_name;
  } else if (msg.payload && (msg.event === 'r2.sensor.acceleration' || msg.event === 'acceleration')) {
    const x = msg.payload.x ?? 0, y = msg.payload.y ?? 0, z = msg.payload.z ?? 0;
    valueStr = `x=${x.toFixed(3)} y=${y.toFixed(3)} z=${z.toFixed(3)}`;
  } else if (msg.payload) {
    valueStr = JSON.stringify(msg.payload);
  }
  const entry = document.createElement('div');
  entry.className = 'log-entry';
  entry.innerHTML = `<span class="time">${time}</span> <span class="src">[${src}]</span> <span class="event">${msg.event}</span> <span class="value">${valueStr}</span>`;
  el.insertBefore(entry, el.firstChild);
  while (el.children.length > 100) el.removeChild(el.lastChild);
}

// ── Phase 8a — Devices view ────────────────────────────────────────────
//
// "Live" shows charts; "Devices" shows fleet status (one card per peer
// with battery / fw_ver / last-seen / virtual LED / Update-Firmware
// stub). Both views consume the same `sensors` Map; the per-event
// handlers above update battery / fwVer / lastSeen on each sensor
// object and call renderDevicesIfVisible().

let currentView = 'live';
// Sensors send `r2.sensor.status` every 2 s — these thresholds are
// counted in "how many status events have we missed?" 4 s = ~1 missed
// (probably a network blip), 6 s = 3 missed (confident offline).
const STALE_MS    = 4_000;
const OFFLINE_MS  = 6_000;

function setView(name) {
  currentView = name;
  // Toggle the `hidden` attribute (CSS hook) AND set inline `display` so we
  // win against any cached/legacy CSS that beats the [hidden] selector — past
  // regressions came from `.main { display: grid; }` overriding `[hidden]`.
  const live    = document.getElementById('liveMain');
  const devices = document.getElementById('devicesMain');
  live.hidden    = (name !== 'live');
  devices.hidden = (name !== 'devices');
  live.style.display    = (name === 'live')    ? 'grid'  : 'none';
  devices.style.display = (name === 'devices') ? 'block' : 'none';
  document.getElementById('viewLive').classList.toggle('active',    name === 'live');
  document.getElementById('viewDevices').classList.toggle('active', name === 'devices');
  if (name === 'devices') renderDevices();
}

function renderDevicesIfVisible() {
  if (currentView === 'devices') renderDevices();
}

function fmtAge(ms) {
  if (ms < 1500)   return 'just now';
  if (ms < 60_000) return `${Math.round(ms/1000)} s ago`;
  if (ms < 3600_000) return `${Math.round(ms/60_000)} min ago`;
  return `${Math.round(ms/3600_000)} h ago`;
}

function classifyOnline(s) {
  const age = Date.now() - (s.lastSeen ?? 0);
  if (!s.online || age > OFFLINE_MS) return 'offline';
  if (age > STALE_MS) return 'stale';
  return 'online';
}

// Map firmware FSM-state numbers (Phase 5L will define these) to the
// CSS class that drives the virtual-LED colour + animation. Until
// firmware sends real state values, fsmState is null and the LED
// stays the inert grey placeholder.
function ledClassFor(s) {
  // Optimistic client-side override while a reset is in flight — wins over
  // whatever the last status frame said, until the sensor reconnects.
  if (s.pendingReset) return 'tg-resetting';
  if (s.fsmState == null) return '';
  // If the sensor's gone offline (no events for OFFLINE_MS), don't
  // pretend we know its FSM state — fall back to the inert grey
  // placeholder. classifyOnline() reads s.lastSeen against
  // OFFLINE_MS / STALE_MS thresholds defined above.
  if (classifyOnline(s) === 'offline') return '';
  switch (s.fsmState) {
    case 0:  return 'tg-boot';         // BOOT
    case 1:  return 'tg-advertising';  // ADVERTISING
    case 2:  return 'tg-ble';          // BLE_CONNECTED
    case 3:  return 'tg-ble';          // WIFI_CONNECTING
    case 4:  return 'tg-streaming';    // STREAMING
    case 5:  return 'tg-catchup';      // STREAMING_CATCHUP
    case 6:  return 'tg-cal';          // CALIBRATING
    case 7:  return 'tg-low';          // LOW_BATTERY
    case 8:  return 'tg-ota';          // OTA
    case 9:  return 'tg-error';        // ERROR
    case 10: return 'tg-streaming-sim'; // STREAMING_DEGRADED_SIM (SPEC-R2-ROCKER-SENSOR-HEALTH)
    default: return '';
  }
}

// Render the health-source row (dot + label) per SPEC-R2-ROCKER-SENSOR-HEALTH §6.
// Always visible once data_source is known; hidden until the first status frame.
function healthRowFor(s) {
  if (s.dataSource == null) return '';
  if (s.dataSource === 0) {
    return '<div class="health-row"><div class="health-dot health-real" title="ADXL355 ok"></div><span class="health-label">Real ADXL355</span></div>';
  }
  return '<div class="health-row"><div class="health-dot health-sim" title="Sensor not reading — synthetic data on the wire"></div><span class="health-label health-sim-text">Sim fallback — sensor not reading</span></div>';
}

function renderDevices() {
  const area = document.getElementById('devicesArea');
  const peers = [...sensors.values()];
  if (peers.length === 0) {
    area.innerHTML = '<div class="card" id="devicesPlaceholder" style="color:#475569;text-align:center;padding:40px;">No sensors known yet — wait for an announce or click <em>Connect Sensors</em>.</div>';
    updateDevicesSummary(peers);
    return;
  }

  // Stable sort by hostname/key so cards don't jump around.
  peers.sort((a, b) => (a.deviceName ?? a.key).localeCompare(b.deviceName ?? b.key));

  area.innerHTML = peers.map(s => {
    const status   = classifyOnline(s);
    const name     = s.deviceName ?? s.key;
    const ip       = s.key;
    // Show the full fw_ver verbatim — operator wants to see semver +
    // git short-sha + any tag (e.g. " sim") on the card directly.
    // Once a "current expected firmware" register exists (Phase 9-fwreg),
    // a mismatch will get a small "out-of-date" badge layered on top.
    const fwShort  = s.fwVer ?? '—';
    const battMv   = s.battery?.voltage_mv ?? null;
    const battPct  = s.battery?.percent ?? null;
    const battCharging = s.battery?.charging ?? false;
    const battClass = battPct == null ? ''
                     : battPct < 10 ? 'crit'
                     : battPct < 25 ? 'low' : '';
    const lastSeen = s.lastSeen ? fmtAge(Date.now() - s.lastSeen) : '—';
    const led      = ledClassFor(s);

    return `
      <div class="device-card ${status}" data-key="${escapeAttr(s.key)}">
        <div class="device-header">
          <div class="virt-led ${led}" title="virtual LED${s.fsmState == null ? ' — awaiting Phase 5L FSM state' : ''}"></div>
          <div style="flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">${escapeText(name)}</div>
        </div>
        ${healthRowFor(s)}
        <div class="device-row"><span class="label">addr</span><span class="value">${escapeText(ip)}</span></div>
        <div class="device-row"><span class="label">firmware</span><span class="value" title="${escapeAttr(s.fwVer ?? '—')}">${escapeText(fwShort)}</span></div>
        <div class="device-row"><span class="label">last seen</span><span class="value">${lastSeen}</span></div>
        <div class="device-row">
          <span class="label">battery</span>
          <span class="value">${battMv != null ? (battMv + ' mV') : '—'}${battPct != null ? ` (${battPct}%)` : ''}${battCharging ? ' ⚡' : ''}</span>
        </div>
        ${battPct != null ? `<div class="battery-bar"><div class="${battClass}" style="width:${Math.max(2, Math.min(100, battPct))}%;"></div></div>` : ''}
        <div class="device-actions">
          <button class="btn-update" onclick="requestFirmwareUpdate('${escapeAttr(s.key)}')">⬆ Update Firmware</button>
          <button class="btn-reset" onclick="requestReset('${escapeAttr(s.key)}')">↻ Reset Sensor</button>
        </div>
      </div>`;
  }).join('');

  updateDevicesSummary(peers);
}

function updateDevicesSummary(peers) {
  const counts = { online: 0, stale: 0, offline: 0, needsUpdate: 0 };
  for (const s of peers) {
    counts[classifyOnline(s)]++;
    // Update flagging is a stub until Phase 9 ships a real "current
    // version" for the dashboard to compare against.
    if (s._needsUpdate) counts.needsUpdate++;
  }
  document.getElementById('dsTotal').textContent       = peers.length;
  document.getElementById('dsOnline').textContent      = counts.online;
  document.getElementById('dsStale').textContent       = counts.stale;
  document.getElementById('dsOffline').textContent     = counts.offline;
  document.getElementById('dsNeedsUpdate').textContent = counts.needsUpdate;
}

// OTA progress events from /ws/status (dashboard's /api/ota/{addr} handler
// broadcasts these). Reuses the Connection Log panel as a generic
// "activity feed" so the operator sees phase transitions live without
// needing to read browser console.
function handleOtaEvent(msg) {
  // Auto-open the Connection Log on first event so the operator sees it
  // even if they triggered the OTA from the Devices view.
  document.getElementById('bootstrap-panel').classList.add('visible');
  switch (msg.phase) {
    case 'uploading':
      addBootstrapLine(`⬆ Pushing firmware to ${msg.target} (${msg.size} bytes)…`, 'amber');
      break;
    case 'applied':
      addBootstrapLine(`✓ ${msg.target} accepted: ${msg.message || 'rebooting'}`, 'green');
      break;
    case 'rejected':
      addBootstrapLine(`✗ ${msg.target} rejected: ${msg.message || 'unknown'}`, 'red');
      break;
    case 'error':
      addBootstrapLine(`✗ ${msg.target}: ${msg.message || 'error'}`, 'red');
      break;
  }
}

function requestFirmwareUpdate(addr) {
  // Phase 9-light: open a file picker, POST the chosen .bin to the
  // dashboard's /api/ota/{addr}, watch progress via /ws/status events.
  // Phase 9-secure (#24) will add Ed25519 signing + verify before swap.
  const btn = document.querySelector(`.device-card[data-key="${addr}"] .btn-update`);
  if (!btn) return;

  const picker = document.createElement('input');
  picker.type = 'file';
  picker.accept = '.bin,application/octet-stream';
  picker.style.display = 'none';
  picker.onchange = async () => {
    const file = picker.files && picker.files[0];
    if (!file) return;
    btn.disabled = true;
    btn.textContent = `⬆ Uploading ${(file.size / 1024).toFixed(0)} KB…`;
    try {
      const res = await fetch(`/api/ota/${encodeURIComponent(addr)}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/octet-stream' },
        body: file,
      });
      const out = await res.json().catch(() => ({}));
      if (res.ok && out.ok) {
        btn.textContent = '✓ Updated';
      } else {
        btn.textContent = '✗ Update failed';
        console.warn('[ota] failed:', out);
      }
    } catch (err) {
      btn.textContent = '✗ Network error';
      console.warn('[ota] fetch error:', err);
    }
    setTimeout(() => {
      btn.textContent = '⬆ Update Firmware';
      btn.disabled = false;
    }, 4000);
  };
  document.body.appendChild(picker);
  picker.click();
  setTimeout(() => picker.remove(), 60_000);
}

function escapeText(s) {
  return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function escapeAttr(s) { return escapeText(s).replace(/"/g, '&quot;'); }

// SPEC-R2-ROCKER-SENSOR-REMOTE-RESET: POST /api/sensor/{addr}/reset,
// watch progress via /ws/status reset events. Flips the virtual-LED dot
// to a transient grey-pulse "resetting" state immediately on click, so
// the user gets visual confirmation that something is happening; the
// flag clears on the first status frame from the rebooted sensor (or
// after a 10 s failsafe in case the sensor never comes back).
async function requestReset(addr) {
  const btn = document.querySelector(`.device-card[data-key="${addr}"] .btn-reset`);
  if (!btn) return;
  const sensor = sensors.get(addr);
  if (sensor) {
    sensor.pendingReset = true;
    renderDevicesIfVisible();
    updateSensorList();
    setTimeout(() => {
      if (sensor.pendingReset) {
        sensor.pendingReset = false;
        renderDevicesIfVisible();
        updateSensorList();
      }
    }, 10_000);
  }
  btn.disabled = true;
  btn.textContent = '↻ Resetting…';
  try {
    const res = await fetch(`/api/sensor/${encodeURIComponent(addr)}/reset`, { method: 'POST' });
    const out = await res.json().catch(() => ({}));
    btn.textContent = (res.ok && out.ok) ? '✓ Reset' : '✗ Failed';
    if (!(res.ok && out.ok)) console.warn('[reset] failed:', out);
  } catch (err) {
    btn.textContent = '✗ Network error';
    console.warn('[reset] fetch error:', err);
  }
  setTimeout(() => {
    btn.textContent = '↻ Reset Sensor';
    btn.disabled = false;
  }, 4000);
}

// Keep online/stale/offline classification fresh even when no events
// arrive for a while — re-render once a second when Devices is visible.
// Re-render every second so online/stale/offline classification refreshes
// even without events arriving. Sidebar dot and Devices-view LED both
// depend on `classifyOnline(s)` against `lastSeen`, so both need a tick.
setInterval(() => {
  updateSensorList();
  if (currentView === 'devices') renderDevices();
}, 1000);

// Module scripts isolate names; expose the inline-onclick handlers on
// `window` so the existing onclick="..." attributes in the HTML still
// resolve. (Cleaner long-term: addEventListener bindings, but this
// keeps the diff vs the legacy dashboard minimal.)
Object.assign(window, {
  setView,
  startBootstrap,
  sendCmd,
  closeBootstrapPanel,
  requestFirmwareUpdate,
  requestReset,
});
</script>
</body>
</html>
